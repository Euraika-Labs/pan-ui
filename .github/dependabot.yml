version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: "UTC"
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - javascript
    commit-message:
      prefix: "deps"
      include: "scope"
    groups:
      nextjs-stack:
        patterns:
          - "next"
          - "react"
          - "react-dom"
          - "eslint-config-next"
      testing-stack:
        patterns:
          - "@playwright/*"
          - "playwright"
          - "vitest"
          - "@testing-library/*"
          - "jsdom"
      tooling-stack:
        patterns:
          - "eslint"
          - "@typescript-eslint/*"
          - "typescript"
          - "prettier"
          - "tailwindcss"
          - "postcss"
          - "autoprefixer"
    ignore:
      - dependency-name: "next"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react-dom"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:30"
      timezone: "UTC"
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: "ci"
      include: "scope"
    groups:
      actions:
        patterns:
          - "*"
